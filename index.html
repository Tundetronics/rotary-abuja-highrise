<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotary Abuja High Rise | District 9127</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="watermark-bg">
    <header class="main-header">
        <nav class="container">
            <div class="logo-area">
                <svg width="45" height="45" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#F7A81B" />
                    <circle cx="50" cy="50" r="35" fill="none" stroke="#17458F" stroke-width="5" />
                    <path d="M50 20 L50 80 M20 50 L80 50" stroke="#17458F" stroke-width="4"/>

                <div class="logo-text">
                    <span class="club-name">Abuja High Rise</span>
                    <span class="district-id">District 9127</span>

            <ul class="nav-links">

    <section class="hero">
        <div class="video-container">
            <video autoplay muted loop playsinline id="hero-video">

            </video>
        </div>
        <div class="hero-content container">
            <h1>People of Action.</h1>
            <p>Serving Abuja and 16 Northern States in District 9127.</p>
        </div>

    <section id="donate" style="padding:100px 0; text-align:center;">
        <div class="container">
            <h2>Support Our Mission</h2>
            <a href="https://paystack.com" class="nav-cta" style="font-size:1.5rem; padding:20px 40px;">Contribute via Paystack</a>

    <script src="script.js"></script>

</html>
